name: Docker Build

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/api/Dockerfile
          tags: aios-api:latest
          load: true
      - name: Build Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/web/Dockerfile
          tags: aios-web:latest
          load: true
      - name: Test Docker images
        run: |
          docker run --rm aios-api:latest node -e "console.log('API image OK')"
          docker run --rm aios-web:latest node -e "console.log('Web image OK')"
