version: '3.8'

services:
  operator-console:
    build:
      context: .
      dockerfile: apps/operator-console/Dockerfile
    ports:
      - "3500:3500"
    environment:
      - NODE_ENV=production
      - PORT=3500
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3500/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  mcp-server:
    build:
      context: .
      dockerfile: apps/mcp-server/Dockerfile
    environment:
      - NODE_ENV=production
    restart: unless-stopped

networks:
  default:
    name: sangfor-network
