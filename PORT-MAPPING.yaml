# Sangfor Agentic OS — Port Mapping
# Unified port registry for all services

services:
  # Core Infrastructure
  postgres:
    port: 5434
    service: sangfor-postgres
    description: PostgreSQL primary database
  redis:
    port: 6380
    service: sangfor-redis
    description: Redis cache & session store

  # Application Servers
  web:
    port: 3101
    service: sangfor-web
    description: Next.js web application
  api:
    port: 3200
    service: sangfor-api
    description: Express API server
  # finance: [DEPRECATED — merged into api:3200]
  # finance:
  #   port: 4100
  #   service: sangfor-finance
  #   description: [DEPRECATED] Merged into sangfor-api:3200

  # External Services (docker-compose managed)
  sangfor-mcp:
    port: 3501
    service: sangfor-mcp
    description: Sangfor MCP mock upstream
  vibe-coding:
    port: 4000
    service: vibe-coding-os
    description: Vibe Coding OS
  mail-intelligence:
    port: 3010
    service: mail-intelligence
    description: Mail Intelligence service
  whelp99-mcp:
    port: 3600
    service: whelp99-mcp
    description: Whelp99 MCP bridge
  # cfo-aios: [DEPRECATED — merged into sangfor-api:3200]
  # cfo-aios:
  #   port: 4100
  #   service: cfo-aios
  #   description: [DEPRECATED] Merged into sangfor-api:3200

  # Monitoring
  prometheus:
    port: 9090
    service: sangfor-prometheus
  grafana:
    port: 3000
    service: sangfor-grafana
  caddy:
    port: 80
    service: sangfor-caddy
    description: Reverse proxy (auto HTTPS)
  caddy-admin:
    port: 443
    service: sangfor-caddy-admin

  # Sangfor MCP Services
  sangfor-mcp-workflow:
    port: 3500
    service: sangfor-mcp-workflow
    description: Sangfor MCP workflow orchestrator (Express REST + MCP)
  sangfor-mcp-mock-console:
    port: 3400
    service: sangfor-mcp-mock-console
    description: Mock Sangfor device console
  sangfor-engineer-mcp:
    port: 3600
    service: sangfor-engineer-mcp
    description: Sangfor engineer MCP HTTP bridge
  sangfor-operator-console:
    port: 3502
    service: sangfor-operator-console
    description: Sangfor operator console UI
